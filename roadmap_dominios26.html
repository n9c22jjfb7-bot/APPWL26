<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<title>Roadmap Dominios</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4f8;padding:20px;color:#1e293b}
.header{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.logo{width:46px;height:46px;flex-shrink:0}
.header h1{font-size:22px;font-weight:700;color:#0f172a}
.header-sub{font-size:11px;color:#94a3b8;margin-top:2px}
.header-timestamp{position:absolute;top:20px;right:20px;font-size:10px;color:#94a3b8;text-align:right;line-height:1.4}
.filter-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:12px 16px;margin-bottom:12px;display:flex;gap:18px;flex-wrap:wrap;align-items:center}
.fg>label{font-size:10px;font-weight:700;color:#94a3b8;display:block;margin-bottom:5px;letter-spacing:.05em}
.divider{width:1px;height:32px;background:#e2e8f0}
.btn-group{display:flex;gap:5px;flex-wrap:wrap}
.btn{padding:5px 12px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s}
.flag-wrap{display:flex;gap:8px;align-items:center}
.flag-btn{width:34px;height:34px;border-radius:50%;border:2px solid transparent;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s;user-select:none}
.flag-btn:hover{transform:scale(1.1)}
.flag-btn.solo-active{outline:3px solid #0369a1;outline-offset:2px}
.switch-wrap{display:flex;align-items:center;gap:8px}
.switch-label{font-size:11px;font-weight:600;color:#64748b}
.switch{width:44px;height:24px;border-radius:12px;cursor:pointer;position:relative;border:none;outline:none;transition:background .2s}
.switch-knob{position:absolute;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:left .2s}
.kpis{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.kpi{padding:10px 14px;border-radius:8px;border:2px solid #e2e8f0;background:#f1f5f9;cursor:pointer;transition:all .15s;user-select:none}
.kpi.global{background:#dcfce7;border-color:#86efac;cursor:default}
.kpi-label{font-size:10px;font-weight:600;color:#64748b}
.kpi-val{font-size:17px;font-weight:700}
.legend-bar{display:flex;align-items:center;gap:18px;flex-wrap:wrap;background:#fff;border:1px solid #e2e8f0;border-bottom:none;border-radius:10px 10px 0 0;padding:9px 18px;justify-content:flex-end}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#475569;font-weight:500}
.legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.gantt-wrap{overflow-x:auto;background:#fff;border:1px solid #e2e8f0;border-radius:0 0 10px 10px}
.gantt-inner{display:flex}
.sidebar{width:220px;flex-shrink:0}
.sidebar-head,.sidebar-foot{border-right:1px solid #e2e8f0}
.domain-cell{border-right:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 10px;gap:7px}
.domain-name{font-size:13px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;text-align:center}
.domain-po{font-size:10px;color:#64748b;text-align:center;margin-top:-4px}
.domain-cta{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;text-decoration:none;color:#fff}
.domain-cta:hover{opacity:.8}
.sem-box{width:100%;border-radius:8px;padding:6px 10px;display:flex;justify-content:space-around;align-items:center}
.sem-col{text-align:center}
.sem-num{font-size:20px;font-weight:900;line-height:1}
.sem-sub{font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-top:1px}
.sem-sep{width:1px;height:24px;opacity:.2}
.domain-alerts{display:flex;gap:4px;flex-wrap:wrap;justify-content:center}
.alert-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;display:flex;align-items:center;gap:3px}
.timeline{flex:1;display:flex;flex-direction:column}
.month-header,.month-footer{display:flex}
.month-col{flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:1px solid #e2e8f0;height:60px}
.month-col-foot{flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:1px solid #e2e8f0;height:42px}
.month-name{font-size:14px;font-weight:700}
.month-year{font-size:11px;color:#94a3b8}
.month-name-sm{font-size:12px;font-weight:600}
.month-year-sm{font-size:9px;color:#94a3b8}
.rows-area{flex:1;position:relative}
.today-line{position:absolute;top:0;bottom:0;width:2px;background:#ef4444;box-shadow:0 0 8px #ef444499;z-index:20;pointer-events:none}
.today-label{position:absolute;top:4px;transform:translateX(-50%);background:#ef4444;color:#fff;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;white-space:nowrap;z-index:21;pointer-events:none}
.epic-row{position:relative;border-bottom:1px solid #f1f5f9}
.grid-line{position:absolute;top:0;bottom:0;width:1px;background:#f1f5f9;pointer-events:none}
.epic-bar{position:absolute;border-radius:5px;padding:4px 7px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.epic-flag{position:absolute;top:3px;right:4px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px}
.epic-jira{position:absolute;top:3px;right:26px;font-size:8px;font-weight:700;padding:1px 3px;border-radius:2px;color:#fff;text-decoration:none;line-height:13px}
.epic-expand{position:absolute;top:3px;right:50px;font-size:8px;font-weight:700;padding:1px 4px;border-radius:2px;color:#fff;cursor:pointer;border:none;line-height:13px}
.epic-title{font-size:10px;font-weight:700;margin-right:70px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.epic-meta{display:flex;align-items:center;gap:3px;margin-top:2px}
.epic-key{font-size:8px;font-weight:700;padding:1px 3px;border-radius:2px}
.progress-bg{position:absolute;bottom:3px;left:6px;right:6px;height:3px;border-radius:2px}
.progress-fill{height:100%;border-radius:2px}
#tooltip{position:fixed;background:#1e293b;color:#f1f5f9;padding:14px;border-radius:10px;font-size:11px;z-index:9999;max-width:320px;width:320px;box-shadow:0 8px 28px rgba(0,0,0,.35);pointer-events:none;display:none}
.tt-title{font-weight:700;font-size:13px;margin-bottom:4px}
.tt-key{color:#94a3b8;font-size:10px;margin-bottom:7px}
.tt-status{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;color:#fff;display:inline-block;margin-bottom:5px}
.tt-dates{color:#cbd5e1;font-size:10px;margin-bottom:7px}
.tt-prog-row{display:flex;justify-content:space-between;font-size:10px;color:#94a3b8;margin-bottom:4px}
.tt-prog-bg{height:4px;background:#334155;border-radius:2px}
.tt-prog-fill{height:100%;border-radius:2px}
.tt-divider{border:none;border-top:1px solid #334155;margin:10px 0}
.tt-tickets-title{font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:6px;letter-spacing:.05em}
.tt-ticket-row{display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid #1e3a5f}
.tt-ticket-row:last-child{border-bottom:none}
.tt-ticket-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tt-ticket-key{font-size:9px;font-weight:700;color:#93c5fd;flex-shrink:0}
.tt-ticket-title{font-size:9px;color:#94a3b8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.tt-ticket-status{font-size:8px;font-weight:600;padding:1px 4px;border-radius:2px;flex-shrink:0}
.tickets-drawer{background:#fff;border:1px solid #e2e8f0;border-top:none;border-radius:0 0 10px 10px;overflow:hidden;max-height:0;transition:max-height .25s ease}
.tickets-drawer.open{max-height:600px}
.tickets-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#f8fafc;border-bottom:1px solid #e2e8f0;border-top:1px solid #e2e8f0}
.tickets-header h3{font-size:13px;font-weight:700;color:#0f172a}
.tickets-close{background:none;border:none;cursor:pointer;font-size:16px;color:#94a3b8;padding:2px 6px;border-radius:4px}
.tickets-close:hover{background:#f1f5f9}
.tickets-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;padding:14px;max-height:500px;overflow-y:auto}
.ticket-card{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:7px;border:1px solid #e2e8f0;background:#f8fafc}
.ticket-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.ticket-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.ticket-info{flex:1;min-width:0}
.ticket-key{font-size:10px;font-weight:700;color:#0369a1;text-decoration:none}
.ticket-key:hover{text-decoration:underline}
.ticket-title{font-size:11px;color:#334155;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ticket-status{font-size:9px;font-weight:600;margin-top:3px;padding:1px 5px;border-radius:3px;display:inline-block}
</style>
</head>

function getColW(){ return scale === 'mes' ? 216 : 280; }

function buildCols(){
  var COL_W = getColW();
  if(scale === 'trimestre'){
    var qs = QUARTERS.slice();
    if(sinceLastMonth){
      var prevM = now.getMonth()===0?11:now.getMonth()-1;
      var prevY = now.getMonth()===0?now.getFullYear()-1:now.getFullYear();
      qs = qs.filter(function(q){var l=q.months[q.months.length-1];return l.y>prevY||(l.y===prevY&&l.m>=prevM);});
    }
    var td = qs.reduce(function(s,q){return s+q.days;},0);
    return {type:'trimestre',qs:qs,totalDays:td,COL_W:COL_W};
  }
  var all=[];
  var y=2026,m=4;
  while(y<2027||(y===2027&&m<=3)){all.push({year:y,month:m});m++;if(m>11){m=0;y++;}}
  var months=all;
  if(sinceLastMonth){
    var pm=now.getMonth()===0?11:now.getMonth()-1;
    var py=now.getMonth()===0?now.getFullYear()-1:now.getFullYear();
    var idx=all.findIndex(function(x){return x.year===py&&x.month===pm;});
    if(idx>=0)months=all.slice(idx);
  }
  return {type:'mes',months:months,COL_W:COL_W};
}

function dateToPx(arr,cols){
  var y=arr[0],m=arr[1],d=arr[2];
  var COL_W=cols.COL_W;
  if(cols.type==='mes'){
    var px=0;
    for(var i=0;i<cols.months.length;i++){
      var c=cols.months[i];
      if(c.year===y&&c.month===m)return px+(d/DAYS_IN_MONTH[m])*COL_W;
      px+=COL_W;
    }
    return cols.months.length*COL_W;
  }
  if(!cols.qs.length)return 0;
  var s0=cols.qs[0].months[0];
  var startDate=new Date(s0.y,s0.m,1);
  var days=Math.round((new Date(y,m,d)-startDate)/86400000);
  return Math.max(0,(days/cols.totalDays)*(cols.qs.length*COL_W));
}

function totalW(cols){
  return cols.type==='mes'?cols.months.length*cols.COL_W:cols.qs.length*cols.COL_W;
}

function getEpicPx(epic,cols){
  var tot=totalW(cols);
  var endArr=epic.continua?[2027,3,30]:epic.end;
  var s=Math.max(0,Math.min(dateToPx(epic.start,cols),tot));
  var e=Math.max(0,Math.min(dateToPx(endArr,cols),tot));
  return {startPx:s,endPx:e,widthPx:Math.max(e-s,4)};
}

function packRows(epics,cols){
  if(!epics.length)return[];
  var countryOrder=Object.keys(COUNTRIES);
  var sorted=epics.slice().sort(function(a,b){
    var ca=countryOrder.indexOf(a.country),cb=countryOrder.indexOf(b.country);
    if(ca!==cb)return ca-cb;
    return dateToPx(a.start,cols)-dateToPx(b.start,cols);
  });
  var rows=[];
  for(var i=0;i<sorted.length;i++){
    var epic=sorted[i];
    var px=getEpicPx(epic,cols);
    var placed=false;
    for(var r=0;r<rows.length;r++){
      if(rows[r].country===epic.country&&px.startPx>=rows[r].maxEndPx+8){
        rows[r].epics.push(epic);rows[r].maxEndPx=Math.max(rows[r].maxEndPx,px.endPx);placed=true;break;
      }
    }
    if(!placed){
      for(var r2=0;r2<rows.length;r2++){
        if(px.startPx>=rows[r2].maxEndPx+8){
          rows[r2].epics.push(epic);rows[r2].maxEndPx=Math.max(rows[r2].maxEndPx,px.endPx);placed=true;break;
        }
      }
    }
    if(!placed)rows.push({epics:[epic],maxEndPx:px.endPx,country:epic.country});
  }
  return rows;
}

function semaforo(avg,count){
  if(count===0)return{color:'#94a3b8',bg:'#f1f5f9'};
  if(avg>=70)  return{color:'#16a34a',bg:'#dcfce7'};
  if(avg>=30)  return{color:'#ea580c',bg:'#fff7ed'};
  return             {color:'#dc2626',bg:'#fef2f2'};
}

    var cfg=DOMAINS[domain];
    var psum2=0;epics.forEach(function(e){psum2+=e.progress;});
    var avg=epics.length?Math.round(psum2/epics.length):0;
    var sem=semaforo(avg,epics.length);
    var riskN=epics.filter(function(e){return e.status==='risk';}).length;
    var overdueN=epics.filter(function(e){return e.status==='overdue';}).length;
    var alerts='';
    if(riskN)alerts+='<div class="alert-badge" style="background:#fff7ed;color:#ea580c;border:1px solid #ea580c">! '+riskN+' riesgo</div>';
    if(overdueN)alerts+='<div class="alert-badge" style="background:#fef2f2;color:#dc2626;border:1px solid #dc2626">⚠ '+overdueN+' atraso</div>';
    shHtml+='<div class="domain-cell" style="height:'+h+'px">'
      +'<div><div class="domain-name" style="color:'+cfg.color+'">'+domain+'</div><div class="domain-po">'+cfg.po+'</div></div>'
      +'<a class="domain-cta" href="'+cfg.url+'" target="_blank" style="background:'+cfg.color+'">Ver cronograma ↗</a>'
      +'<div class="sem-box" style="background:'+sem.bg+'">'
        +'<div class="sem-col"><div class="sem-num" style="color:'+sem.color+'">'+epics.length+'</div><div class="sem-sub" style="color:'+sem.color+'">épica'+(epics.length!==1?'s':'')+'</div></div>'
        +'<div class="sem-sep" style="background:'+sem.color+'"></div>'
        +'<div class="sem-col"><div class="sem-num" style="color:'+sem.color+'">'+avg+'%</div><div class="sem-sub" style="color:'+sem.color+'">avance</div></div>'
      +'</div>'
      +(alerts?'<div class="domain-alerts">'+alerts+'</div>':'')
      +'</div>';
  });
  document.getElementById('sidebarRows').innerHTML=shHtml;

  function buildMonthCols(foot){
    var h='';
    if(cols.type==='mes'){
      cols.months.forEach(function(col,i){
        var isNow=col.year===now.getFullYear()&&col.month===now.getMonth();
        var cls=foot?'month-col-foot':'month-col';
        h+='<div class="'+cls+'" style="width:'+COL_W+'px;background:'+(isNow?'#e0f2fe':(i%2===0?'#fff':'#fafafa'))+';border-top:'+(!foot&&isNow?'3px solid #0ea5e9':'none')+'">'
          +'<div class="'+(foot?'month-name-sm':'month-name')+'" style="color:'+(isNow?'#0ea5e9':'#64748b')+'">'+(isNow?'📍':'')+MONTH_NAMES[col.month]+'</div>'
          +'<div class="'+(foot?'month-year-sm':'month-year')+'">'+col.year+'</div>'
          +'</div>';
      });
    } else {
      cols.qs.forEach(function(q,i){
        var isCurrent=q.months.some(function(x){return x.y===now.getFullYear()&&x.m===now.getMonth();});
        var cls=foot?'month-col-foot':'month-col';
        var subNames=q.months.map(function(x){return MONTH_NAMES[x.m];}).join('·');
        h+='<div class="'+cls+'" style="width:'+COL_W+'px;background:'+(isCurrent?'#e0f2fe':(i%2===0?'#fff':'#fafafa'))+';border-top:'+(!foot&&isCurrent?'3px solid #0ea5e9':'none')+'">'
          +'<div class="'+(foot?'month-name-sm':'month-name')+'" style="color:'+(isCurrent?'#0ea5e9':'#64748b')+'">'+(isCurrent?'📍':'')+q.label+'</div>'
          +'<div class="'+(foot?'month-year-sm':'month-year')+'" style="font-size:10px">'+subNames+'</div>'
          +'</div>';
      });
    }
    return h;
  }
  document.getElementById('monthHeader').innerHTML=buildMonthCols(false);
  document.getElementById('monthFooter').innerHTML=buildMonthCols(true);

  document.getElementById('todayLine').style.left=todayPct+'%';
  document.getElementById('todayLabel').style.left=todayPct+'%';
  document.getElementById('todayLabel').textContent='HOY '+now.getDate()+'/'+(now.getMonth()+1);

  var colCount=cols.type==='mes'?cols.months.length:cols.qs.length;
  var gridLines='';
  for(var gi=0;gi<colCount;gi++)gridLines+='<div class="grid-line" style="left:'+(gi*COL_W)+'px"></div>';

  var erHtml='';
  visibleDomains.forEach(function(domain){
    var rows=packRows(byDomain[domain],cols);
    var domainH=Math.max(rows.length*ROW_H, MIN_DOMAIN_H);
    var domainRowsHtml='';
    rows.forEach(function(row,rowIdx){
      var bHtml='';
      row.epics.forEach(function(epic){
        var px=getEpicPx(epic,cols);
        var lPct=(px.startPx/tot)*100;
        var wPct=(px.widthPx/tot)*100;
        var st=STATUS[epic.status];
        var ct=COUNTRIES[epic.country];
        var hasTickets=epic.tickets&&epic.tickets.length>0;
        var safeTitle=epic.title.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        var expandBtn=hasTickets
          ?'<button class="epic-expand" onclick="event.stopPropagation();openTickets(\''+epic.key+'\')" style="background:'+st.border+'">▼ '+epic.tickets.length+'</button>'
          :'';
        bHtml+='<div class="epic-bar"'
          +' onmouseenter="showTip(\''+safeTitle+'\',\''+epic.key+'\',\''+st.label+'\',\''+st.border+'\',\''+fmtDate(epic.start)+'\',\''+fmtDate(epic.end)+'\','+epic.progress+',\''+epic.key+'\')"'
          +' onmouseleave="hideTip()"'
          +' style="left:'+lPct+'%;width:'+wPct+'%;top:'+BAR_GAP+'px;bottom:'+BAR_GAP+'px;background:'+st.bg+';border:2px solid '+st.border+';border-right:'+(epic.continua?'3px dashed '+st.border:'2px solid '+st.border)+'">'
          +'<div class="epic-flag" style="background:'+ct.color+'22">'+ct.flag+'</div>'
          +'<a class="epic-jira" href="'+epic.url+'" target="_blank" style="background:'+st.border+'" onclick="event.stopPropagation()">↗</a>'
          +expandBtn
          +'<div class="epic-title" style="color:'+st.border+'">'+epic.title+'</div>'
          +'<div class="epic-meta">'
          +'<span class="epic-key" style="color:'+st.border+';background:'+st.border+'18">'+epic.key+'</span>'
          +' <span style="color:'+st.border+';font-weight:700;font-size:8px">'+epic.progress+'%</span>'
          +(hasTickets?' <span style="color:'+st.border+';font-size:8px;opacity:.8">· '+epic.tickets.length+' ticket'+(epic.tickets.length!==1?'s':'')+'</span>':'')
          +'</div>'
          +'<div class="progress-bg" style="background:'+st.border+'22"><div class="progress-fill" style="width:'+epic.progress+'%;background:'+st.border+'"></div></div>'
          +'</div>';
      });
      domainRowsHtml+='<div class="epic-row" style="height:'+ROW_H+'px">'+gridLines+bHtml+'</div>';
    });
    erHtml+='<div style="height:'+domainH+'px;position:relative">'+domainRowsHtml+'</div>';
  });
  document.getElementById('epicRows').innerHTML=erHtml;
}

function toggleView(){sinceLastMonth=!sinceLastMonth;render();}
function setScale(s){scale=s;render();}
function toggleStatus(s){filterStatus[s]=!filterStatus[s];render();}
function toggleDomain(d){if(!DOMAINS[d].hasData)return;filterDomains[d]=!filterDomains[d];render();}
function toggleCountry(c){filterCountries[c]=!filterCountries[c];render();}
function setSolo(c){soloCountry=(soloCountry===c?null:c);render();}

function updateTimestamp(){
  var now=new Date();
  var day=String(now.getDate()).padStart(2,'0');
  var mon=String(now.getMonth()+1).padStart(2,'0');
  var year=now.getFullYear();
  var hours=String(now.getHours()).padStart(2,'0');
  var mins=String(now.getMinutes()).padStart(2,'0');
  var secs=String(now.getSeconds()).padStart(2,'0');
  document.getElementById('timestamp').innerHTML='Actualizado:<br/>'+day+'/'+mon+'/'+year+'<br/>'+hours+':'+mins+':'+secs;
}

updateTimestamp();
render();
</script>
</body>
</html>
