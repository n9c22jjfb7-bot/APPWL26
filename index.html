<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Roadmap Dominios — App WL Regional</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f4f8; padding: 20px; color: #1e293b; }

/* HEADER */
.header { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; position: relative; }
.logo { width: 46px; height: 46px; flex-shrink: 0; }
.header h1 { font-size: 22px; font-weight: 700; color: #0f172a; }
.header-sub { font-size: 11px; color: #94a3b8; margin-top: 2px; }
.header-timestamp { position: absolute; top: 0; right: 0; font-size: 10px; color: #64748b; text-align: right; line-height: 1.4; background: #fff; padding: 8px 12px; border-radius: 6px; border: 1px solid #e2e8f0; }

/* FILTER BAR */
.filter-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px 16px; margin-bottom: 12px; display: flex; gap: 18px; flex-wrap: wrap; align-items: center; }
.fg > label { font-size: 10px; font-weight: 700; color: #94a3b8; display: block; margin-bottom: 5px; letter-spacing: .05em; }
.divider { width: 1px; height: 32px; background: #e2e8f0; }
.btn-group { display: flex; gap: 5px; flex-wrap: wrap; }
.btn { padding: 5px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 11px; font-weight: 600; transition: all .15s; }

/* Flag buttons — click=toggle, dblclick=solo ese país */
.flag-wrap { display: flex; gap: 8px; align-items: center; }
.flag-btn { width: 34px; height: 34px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all .15s; background: #e2e8f0; user-select: none; }
.flag-btn:hover { transform: scale(1.1); }
.flag-btn.solo-active { outline: 3px solid #0369a1; outline-offset: 2px; }

/* Switch */
.switch-wrap { display: flex; align-items: center; gap: 8px; }
.switch-label { font-size: 11px; font-weight: 600; color: #64748b; }
.switch { width: 44px; height: 24px; border-radius: 12px; cursor: pointer; position: relative; border: none; outline: none; transition: background .2s; }
.switch-knob { position: absolute; top: 3px; width: 18px; height: 18px; border-radius: 50%; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.25); transition: left .2s; }

/* KPIs */
.kpis { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.kpi { padding: 10px 14px; border-radius: 8px; border: 2px solid #e2e8f0; background: #f1f5f9; cursor: pointer; transition: all .15s; user-select: none; }
.kpi.global { background: #dcfce7; border-color: #86efac; cursor: default; }
.kpi-label { font-size: 10px; font-weight: 600; color: #64748b; }
.kpi-val { font-size: 17px; font-weight: 700; }

/* GANTT CONTAINER */
.gantt-outer { }

/* LEGEND BAR — encima del gantt, barra independiente */
.gantt-legend-bar {
  display: flex;
  align-items: center;
  gap: 18px;
  flex-wrap: wrap;
  background: #fff;
  border: 1px solid #e2e8f0;
  border-bottom: none;
  border-radius: 10px 10px 0 0;
  padding: 9px 18px;
}
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #475569; font-weight: 500; }
.legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
.gantt-wrap { border-radius: 0 0 10px 10px !important; }

.gantt-wrap { overflow-x: auto; background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; }
.gantt-inner { display: flex; }

/* SIDEBAR */
.sidebar { width: 220px; flex-shrink: 0; }
.sidebar-head { border-bottom: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0; }
.sidebar-foot { border-top: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0; }
.domain-cell {
  border-right: 1px solid #e2e8f0;
  background: #fff; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 14px 10px; gap: 8px;
}
.domain-sep {
  height: 3px; background: #94a3b8; flex-shrink: 0; border-right: 1px solid #e2e8f0;
}
.domain-name { font-size: 13px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; text-align: center; line-height: 1.2; }
.domain-po   { font-size: 10px; color: #64748b; text-align: center; line-height: 1.2; font-weight: 500; }
.domain-cta  { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 6px; text-decoration: none; color: #fff; }
.domain-cta:hover { opacity: .8; }

/* Línea separadora horizontal en el área del Gantt */
.epic-row-separator {
  position: absolute; left: 0; right: 0; height: 3px;
  background: #94a3b8; z-index: 5; pointer-events: none;
}

/* Semaphore */
.sem-box { width: 100%; border-radius: 8px; padding: 6px 10px; display: flex; justify-content: space-around; align-items: center; }
.sem-col { text-align: center; }
.sem-num { font-size: 20px; font-weight: 900; line-height: 1; }
.sem-sub { font-size: 9px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; margin-top: 1px; }
.sem-sep { width: 1px; height: 24px; opacity: .2; }

/* Alert badges in domain cell */
.domain-alerts { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; }
.alert-badge { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; display: flex; align-items: center; gap: 3px; }

/* TIMELINE */
.timeline { flex: 1; display: flex; flex-direction: column; }
.month-header { display: flex; border-bottom: 1px solid #e2e8f0; }
.month-footer { display: flex; border-top: 1px solid #e2e8f0; }
.month-col      { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid #e2e8f0; height: 60px; }
.month-col-foot { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid #e2e8f0; height: 42px; }
.month-name     { font-size: 14px; font-weight: 700; }
.month-year     { font-size: 11px; color: #94a3b8; }
.month-name-sm  { font-size: 12px; font-weight: 600; }
.month-year-sm  { font-size: 9px; color: #94a3b8; }

/* ROWS */
.rows-area { flex: 1; position: relative; }
.today-line  { position: absolute; top: 0; bottom: 0; width: 2px; background: #ef4444; box-shadow: 0 0 8px #ef444499; z-index: 20; pointer-events: none; }
.today-label { position: absolute; top: 4px; transform: translateX(-50%); background: #ef4444; color: #fff; padding: 2px 7px; border-radius: 4px; font-size: 9px; font-weight: 700; white-space: nowrap; z-index: 21; pointer-events: none; }
.epic-row  { position: relative; border-bottom: 1px solid #f1f5f9; }
.grid-line { position: absolute; top: 0; bottom: 0; width: 1px; background: #f1f5f9; pointer-events: none; }

/* EPIC BAR */
.epic-bar { position: absolute; border-radius: 5px; padding: 4px 7px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.1); cursor: default; }
.epic-flag { position: absolute; top: 3px; right: 4px; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; }
.epic-jira { position: absolute; top: 3px; right: 26px; font-size: 8px; font-weight: 700; padding: 1px 3px; border-radius: 2px; color: #fff; text-decoration: none; line-height: 13px; }
.epic-title { font-size: 10px; font-weight: 700; margin-right: 48px; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.epic-meta  { display: flex; align-items: center; gap: 3px; margin-top: 2px; }
.epic-key   { font-size: 8px; font-weight: 700; padding: 1px 3px; border-radius: 2px; }
.progress-bg   { position: absolute; bottom: 3px; left: 6px; right: 6px; height: 3px; border-radius: 2px; }
.progress-fill { height: 100%; border-radius: 2px; }

/* TOOLTIP — fixed position, follows mouse */
#tooltip {
  position: fixed;
  background: #1e293b;
  color: #f1f5f9;
  padding: 14px;
  border-radius: 10px;
  font-size: 11px;
  z-index: 9999;
  min-width: 300px;
  max-width: min(560px, calc(100vw - 32px));
  max-height: calc(100vh - 32px);
  overflow-y: auto;
  width: max-content;
  box-shadow: 0 8px 28px rgba(0,0,0,.35);
  pointer-events: auto;
  display: none;
}
.tt-title { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
.tt-key   { color: #94a3b8; font-size: 10px; margin-bottom: 7px; }
.tt-status { padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; color: #fff; display: inline-block; margin-bottom: 5px; }
.tt-dates  { color: #cbd5e1; font-size: 10px; margin-bottom: 7px; }
.tt-prog-row { display: flex; justify-content: space-between; font-size: 10px; color: #94a3b8; margin-bottom: 4px; }
.tt-prog-bg   { height: 4px; background: #334155; border-radius: 2px; }
.tt-prog-fill { height: 100%; border-radius: 2px; }

/* TICKETS PANEL — drawer debajo del gantt */
.tickets-drawer {
  border: 1px solid #e2e8f0;
  border-top: none;
  border-radius: 0 0 10px 10px;
  background: #fff;
  overflow: hidden;
  transition: max-height 0.25s ease;
}
.tickets-drawer.closed { max-height: 0; border: none; }
.tickets-drawer.open   { max-height: 600px; }
.tickets-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px;
  background: #f8fafc;
  border-bottom: 1px solid #e2e8f0;
  border-top: 1px solid #e2e8f0;
}
.tickets-header h3 { font-size: 13px; font-weight: 700; color: #0f172a; }
.tickets-close { background: none; border: none; cursor: pointer; font-size: 16px; color: #94a3b8; padding: 2px 6px; border-radius: 4px; }
.tickets-close:hover { background: #f1f5f9; color: #475569; }
.tickets-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 8px;
  padding: 14px;
  max-height: 520px;
  overflow-y: auto;
}
.ticket-card {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 8px 10px;
  border-radius: 7px;
  border: 1px solid #e2e8f0;
  background: #f8fafc;
  transition: box-shadow .15s;
}
.ticket-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.08); }
.ticket-status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.ticket-info { flex: 1; min-width: 0; }
.ticket-key { font-size: 10px; font-weight: 700; color: #0369a1; text-decoration: none; }
.ticket-key:hover { text-decoration: underline; }
.ticket-title { font-size: 11px; color: #334155; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ticket-status-label { font-size: 9px; font-weight: 600; margin-top: 3px; padding: 1px 5px; border-radius: 3px; display: inline-block; }
</style>
</head>

// ─── ESTADO ───────────────────────────────────────────────────────────────────
const now            = new Date();
let sinceLastMonth   = true;
let showOperacion    = false; // muestra Incrementalidad / Fixes / Deuda técnica
let scale            = 'mes';
let filterStatus     = new Set(Object.keys(STATUS));
let filterDomains    = new Set(Object.keys(DOMAINS).filter(d=>DOMAINS[d].hasData));
let filterCountries  = new Set(Object.keys(COUNTRIES));
let soloCountry      = null; // para "Solo X" quick filter
let expandedEpicKey  = null; // épica actualmente expandida

const OPERACION_KEYWORDS = ['incrementalidad','fixes','deuda'];
function isOperacion(title){ return OPERACION_KEYWORDS.some(k=>title.toLowerCase().includes(k)); }

// Estatus visual efectivo: si la épica ya pasó su fecha de inicio → amarillo
function effectiveStatus(epic){
  if(epic.status==='todo'){
    const s=new Date(epic.start[0],epic.start[1],epic.start[2]);
    if(s<=now) return 'started';
  }
  return epic.status;
}

const SIDEBAR_W = 220;
const ROW_H     = 56;
const BAR_GAP   = 4;

// ─── LAYOUT HELPERS ───────────────────────────────────────────────────────────
function getColW() { return scale === 'mes' ? 216 : 280; } // 216 = 72*3, 280 trimestre

function buildCols() {
  const COL_W = getColW();
  if (scale === 'trimestre') {
    let qs = QUARTERS;
    if (sinceLastMonth) {
      const prevM=now.getMonth()===0?11:now.getMonth()-1;
      const prevY=now.getMonth()===0?now.getFullYear()-1:now.getFullYear();
      qs=QUARTERS.filter(q=>{const l=q.months[q.months.length-1];return l.y>prevY||(l.y===prevY&&l.m>=prevM);});
    }
    return {type:'trimestre',qs,totalDays:qs.reduce((s,q)=>s+q.days,0),COL_W};
  }
  const all=[];
  let y=2026,m=0;
  while(y<2027||(y===2027&&m<=3)){all.push({year:y,month:m});m++;if(m>11){m=0;y++;}}
  let months=all;
  if(sinceLastMonth){
    const prevM=now.getMonth()===0?11:now.getMonth()-1;
    const prevY=now.getMonth()===0?now.getFullYear()-1:now.getFullYear();
    const idx=all.findIndex(x=>x.year===prevY&&x.month===prevM);
    if(idx>=0)months=all.slice(idx);
  }
  return {type:'mes',months,COL_W};
}

function dateToPx(arr,cols){
  const[y,m,d]=arr; const COL_W=cols.COL_W;
  if(cols.type==='mes'){
    let px=0;
    for(let i=0;i<cols.months.length;i++){
      const c=cols.months[i];
      if(c.year===y&&c.month===m)return px+(d/DAYS_IN_MONTH[m])*COL_W;
      px+=COL_W;
    }
    return cols.months.length*COL_W;
  }
  if(!cols.qs.length)return 0;
  const start=new Date(cols.qs[0].months[0].y,cols.qs[0].months[0].m,1);
  const days=Math.round((new Date(y,m,d)-start)/86400000);
  return Math.max(0,(days/cols.totalDays)*(cols.qs.length*cols.COL_W));
}

function totalW(cols){return cols.type==='mes'?cols.months.length*cols.COL_W:cols.qs.length*cols.COL_W;}

function getEpicPx(epic,cols){
  const tot=totalW(cols);
  const endArr=epic.continua?[2027,3,30]:epic.end;
  const s=Math.max(0,Math.min(dateToPx(epic.start,cols),tot));
  const e=Math.max(0,Math.min(dateToPx(endArr,cols),tot));
  return{startPx:s,endPx:e,widthPx:Math.max(e-s,4)};
}

function packRows(epics,cols){
  if(!epics.length)return[];
  const countryOrder=Object.keys(COUNTRIES);
  const sorted=[...epics].sort((a,b)=>{
    const ca=countryOrder.indexOf(a.country),cb=countryOrder.indexOf(b.country);
    if(ca!==cb)return ca-cb;
    return dateToPx(a.start,cols)-dateToPx(b.start,cols);
  });
  const rows=[];
  for(const epic of sorted){
    const{startPx,endPx}=getEpicPx(epic,cols);
    const MARGIN=8;
    let placed=false;
    for(const row of rows){
      if(row.country===epic.country&&startPx>=row.maxEndPx+MARGIN){
        row.epics.push(epic);row.maxEndPx=Math.max(row.maxEndPx,endPx);placed=true;break;
      }
    }
    if(!placed){
      for(const row of rows){
        if(startPx>=row.maxEndPx+MARGIN){
          row.epics.push(epic);row.maxEndPx=Math.max(row.maxEndPx,endPx);
          if(!row.country)row.country=epic.country;placed=true;break;
        }
      }
    }
    if(!placed)rows.push({epics:[epic],maxEndPx:endPx,country:epic.country});
  }
  return rows;
}

function semaforo(avg,count){
  if(count===0)return{color:'#94a3b8',bg:'#f1f5f9'};
  if(avg>=70)  return{color:'#16a34a',bg:'#dcfce7'};
  if(avg>=30)  return{color:'#ea580c',bg:'#fff7ed'};
  return             {color:'#dc2626',bg:'#fef2f2'};
}

function fmtDate(arr){return new Date(arr[0],arr[1],arr[2]).toLocaleDateString('es-ES');}

// ─── TOOLTIP (follows mouse) ──────────────────────────────────────────────────
const TOOLTIP = document.getElementById('tooltip');
let ttVisible = false;
let ttHideTimer = null;

// Position tooltip near cursor (called when bar is hovered)
function positionTip(clientX, clientY) {
  const OFFSET = 16;
  let x = clientX + OFFSET;
  let y = clientY + OFFSET;
  const ttW = TOOLTIP.offsetWidth  || 300;
  const ttH = TOOLTIP.offsetHeight || 260;
  if (x + ttW > window.innerWidth)  x = Math.max(8, clientX - ttW - OFFSET);
  if (y + ttH > window.innerHeight) y = Math.max(8, clientY - ttH - OFFSET);
  TOOLTIP.style.left = x + 'px';
  TOOLTIP.style.top  = y + 'px';
}

// Tooltip stays open when hovered so user can scroll tickets
TOOLTIP.addEventListener('mouseenter', () => {
  clearTimeout(ttHideTimer);
});
TOOLTIP.addEventListener('mouseleave', () => {
  hideTip();
});

function showTip(title,key,label,color,start,end,pct,continua,ev){
  clearTimeout(ttHideTimer);
  document.getElementById('tt-title').textContent = title;
  document.getElementById('tt-key').textContent   = key;
  const s=document.getElementById('tt-status');
  s.textContent=label; s.style.background=color;
  document.getElementById('tt-dates').textContent=`${start} → ${end}`;
  document.getElementById('tt-pct').textContent=pct+'%';
  const f=document.getElementById('tt-fill');
  f.style.width=pct+'%'; f.style.background=color;
  // Tickets
  const allFlat2=Object.values(ALL_EPICS).flat();
  const epObj=allFlat2.find(e=>e.key===key);
  const ttk=document.getElementById('tt-tickets');
  if(epObj&&epObj.tickets&&epObj.tickets.length>0){
    const statusDotColor=s=>{const m={'En progreso':'#0284c7','Ready for Testing':'#7c3aed','Code Review':'#7c3aed','Ready For Release':'#059669','Ready for Deploy':'#059669','Realizado':'#16a34a','Listo':'#16a34a','Hecho':'#16a34a','Backlog':'#94a3b8','Para hacer':'#94a3b8','Cancelado':'#dc2626','Suspendido (Hold)':'#dc2626','En Refinamiento':'#f59e0b','Actividad Refinada':'#f59e0b','Seleccionado para desarrollar':'#0284c7','Pruebas':'#059669','En progreso':'#0284c7'};return m[s]||'#94a3b8';};
    const shown=epObj.tickets;
    ttk.innerHTML='<div style="border-top:1px solid #334155;margin-bottom:6px;padding-top:6px"><span style="font-size:9px;font-weight:700;color:#64748b;letter-spacing:.05em">TICKETS ('+epObj.tickets.length+')</span></div>'+
      shown.map(t=>{
        const c=statusDotColor(t.status);
        const bg=c+'22';
        return '<div style="background:#1e293b;border:1px solid #334155;border-radius:5px;padding:5px 7px;margin-bottom:5px">'
          +'<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">'
          +'<div style="width:6px;height:6px;border-radius:50%;background:'+c+';flex-shrink:0"></div>'
          +'<span style="font-size:9px;font-weight:700;color:#7dd3fc;flex-shrink:0">'+t.key+'</span>'
          +'</div>'
          +'<div style="font-size:10px;color:#e2e8f0;line-height:1.35;margin-bottom:4px;word-break:break-word">'+t.title+'</div>'
          +'<span style="font-size:8px;font-weight:600;padding:1px 6px;border-radius:3px;background:'+bg+';color:'+c+';border:1px solid '+c+'44">'+t.status+'</span>'
          +'</div>';
      }).join('');
    ttk.style.display='block';
  } else { ttk.innerHTML=''; ttk.style.display='none'; }
  TOOLTIP.style.display='block';
  ttVisible=true;
  if(ev) positionTip(ev.clientX, ev.clientY);
}
function hideTip(){ clearTimeout(ttHideTimer); TOOLTIP.style.display='none'; ttVisible=false; }
function scheduleHide(){ ttHideTimer=setTimeout(hideTip, 250); }

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const cols=buildCols();
  const tot=totalW(cols);
  const COL_W=cols.COL_W;

  // Effective country filter: soloCountry overrides filterCountries
  const activeCodes = soloCountry ? new Set([soloCountry]) : filterCountries;

  const allFlat=Object.entries(ALL_EPICS).flatMap(([d,list])=>list.map(e=>({...e,domain:d})));
  const filtered=allFlat.filter(e=>
    filterStatus.has(effectiveStatus(e)) &&
    filterDomains.has(e.domain) &&
    activeCodes.has(e.country) &&
    (showOperacion || !isOperacion(e.title))
  );
  const byDomain={};
  Object.keys(DOMAINS).forEach(d=>{byDomain[d]=[];});
  filtered.forEach(e=>byDomain[e.domain].push(e));
  const visibleDomains=Object.keys(DOMAINS).filter(d=>filterDomains.has(d)&&byDomain[d].length>0);

  const stats={
    done:   filtered.filter(e=>effectiveStatus(e)==='done').length,
    ontrack:filtered.filter(e=>effectiveStatus(e)==='ontrack'||effectiveStatus(e)==='started').length,
    risk:   filtered.filter(e=>effectiveStatus(e)==='risk').length,
    overdue:filtered.filter(e=>effectiveStatus(e)==='overdue').length,
    todo:   filtered.filter(e=>effectiveStatus(e)==='todo').length,
    total:  filtered.length,
    avg:    filtered.length?Math.round(filtered.reduce((s,e)=>s+e.progress,0)/filtered.length):0,
  };

  const tPct=(Math.max(0,Math.min(dateToPx([now.getFullYear(),now.getMonth(),now.getDate()],cols),tot))/tot)*100;
  document.getElementById('ganttInner').style.minWidth=(SIDEBAR_W+tot)+'px';

  // ── Switch VISTA
  const sw=document.getElementById('switchBtn'),kn=document.getElementById('switchKnob');
  sw.style.background=sinceLastMonth?'#0369a1':'#cbd5e1';
  kn.style.left=sinceLastMonth?'23px':'3px';
  document.getElementById('switchHint').textContent=sinceLastMonth?`Abr ${now.getFullYear()} →`:'Ene 2026 →';
  // ── Switch OPERACIÓN
  const swOp=document.getElementById('switchOp'),knOp=document.getElementById('switchOpKnob');
  swOp.style.background=showOperacion?'#ca8a04':'#cbd5e1';
  knOp.style.left=showOperacion?'23px':'3px';

  // ── Scale buttons
  ['btnMes','btnTrimestre'].forEach(id=>{
    const a=(id==='btnMes'&&scale==='mes')||(id==='btnTrimestre'&&scale==='trimestre');
    const b=document.getElementById(id);
    b.style.background=a?'#0369a1':'#e2e8f0'; b.style.color=a?'#fff':'#64748b';
  });

  // ── Domain buttons
  document.getElementById('domainBtns').innerHTML=Object.entries(DOMAINS).map(([d,cfg])=>{
    const active=filterDomains.has(d);
    return`<button class="btn" onclick="${cfg.hasData?`toggleDomain('${d}')`:''}"
      style="background:${active?cfg.color:'#e2e8f0'};color:${active?'#fff':'#94a3b8'};
             cursor:${cfg.hasData?'pointer':'not-allowed'};opacity:${cfg.hasData?1:0.4}"
      title="${cfg.hasData?'':'Sin datos cargados'}">${d}</button>`;
  }).join('');

  // ── Country buttons: click=toggle, dblclick=solo ese país
  document.getElementById('countryBtns').innerHTML=`
    <div class="flag-wrap">
      ${Object.entries(COUNTRIES).map(([c,{name,flag,color}])=>{
        const isActive=activeCodes.has(c);
        const isSolo=soloCountry===c;
        return `<button class="flag-btn${isSolo?' solo-active':''}"
          onclick="toggleCountry('${c}')"
          ondblclick="setSolo(soloCountry==='${c}'?null:'${c}')"
          title="${name} · Doble clic = ver solo este país"
          style="background:${isActive?color:'#e2e8f0'};
                 box-shadow:${isActive?'0 0 0 3px '+color+'44':'none'};
                 opacity:${!isActive&&soloCountry&&soloCountry!==c?0.35:1}">${flag}</button>`;
      }).join('')}
      ${soloCountry?`<button onclick="setSolo(null)" title="Quitar filtro solo" style="padding:4px 8px;border-radius:6px;border:none;cursor:pointer;font-size:10px;font-weight:700;background:#ef4444;color:#fff;margin-left:4px">✕</button>`:''}
    </div>`;

  // ── KPIs
  document.getElementById('kpis').innerHTML=`
    ${[
      {label:'Done',  count:stats.done,   color:'#16a34a',icon:'✓',st:'done'},
      {label:'En curso', count:stats.ontrack,color:'#d97706',icon:'▶',st:'ontrack'},
      {label:'Riesgo',count:stats.risk,   color:'#ea580c',icon:'!',st:'risk'},
      {label:'Atraso',count:stats.overdue,color:'#dc2626',icon:'⚠',st:'overdue'},
      {label:'Pend.', count:stats.todo,   color:'#6b7280',icon:'○',st:'todo'},
      {label:'Total', count:stats.total,  color:'#64748b',icon:'#',st:null},
    ].map(c=>`<div class="kpi" onclick="${c.st?`toggleStatus('${c.st}')`:''}"
      style="border-color:${c.st&&filterStatus.has(c.st)?c.color:'#e2e8f0'};opacity:${c.st&&!filterStatus.has(c.st)?0.4:1};cursor:${c.st?'pointer':'default'}">
      <div class="kpi-label">${c.label}</div><div class="kpi-val" style="color:${c.color}">${c.icon} ${c.count}</div></div>`).join('')}`;

  // ── Legend top-right of gantt
  document.getElementById('ganttLegend').innerHTML=Object.entries(STATUS).map(([k,v])=>
    `<div class="legend-item">
      <div class="legend-dot" style="background:${v.bg};border:1px solid ${v.border}"></div>
      <span>${v.label}</span>
    </div>`
  ).join('');

  // ── Sidebar head/foot heights match header/footer
  const HEADER_H=60, FOOTER_H=42;
  document.getElementById('sidebarHead').style.height=HEADER_H+'px';
  document.getElementById('sidebarFoot').style.height=FOOTER_H+'px';

  // ── Sidebar rows
  document.getElementById('sidebarRows').innerHTML=visibleDomains.map((domain,di)=>{
    const epics=byDomain[domain];
    const rows=packRows(epics,cols);
    const h=Math.max(rows.length*ROW_H, 190);
    const isLastSidebar = di === visibleDomains.length - 1;
    const cfg=DOMAINS[domain];
    const avg=epics.length?Math.round(epics.reduce((s,e)=>s+e.progress,0)/epics.length):0;
    const sem=semaforo(avg,epics.length);
    const riskCount=epics.filter(e=>e.status==='risk').length;
    const overdueCount=epics.filter(e=>e.status==='overdue').length;
    const alertsHTML=(riskCount||overdueCount)?`
      <div class="domain-alerts">
        ${riskCount?`<div class="alert-badge" style="background:#fff7ed;color:#ea580c;border:1px solid #ea580c">! ${riskCount} riesgo</div>`:''}
        ${overdueCount?`<div class="alert-badge" style="background:#fef2f2;color:#dc2626;border:1px solid #dc2626">⚠ ${overdueCount} atraso</div>`:''}
      </div>`:'';
    const sidebarSep = isLastSidebar ? '' : '<div class="domain-sep"></div>';
    return`<div class="domain-cell" style="height:${h}px">
      <div style="display:flex;flex-direction:column;align-items:center;gap:2px"><div class="domain-name" style="color:${cfg.color}">${domain}</div><div class="domain-po">${cfg.po}</div></div>
      <a class="domain-cta" href="${cfg.url}" target="_blank" style="background:${cfg.color}">Ver cronograma ↗</a>
      <div class="sem-box" style="background:${sem.bg}">
        <div class="sem-col"><div class="sem-num" style="color:${sem.color}">${epics.length}</div><div class="sem-sub" style="color:${sem.color}">épica${epics.length!==1?'s':''}</div></div>
        <div class="sem-sep" style="background:${sem.color}"></div>
        <div class="sem-col"><div class="sem-num" style="color:${sem.color}">${avg}%</div><div class="sem-sub" style="color:${sem.color}">avance</div></div>
      </div>
      ${alertsHTML}
    </div>${sidebarSep}`;
  }).join('');

  // ── Month header/footer (NO Enero highlight — solo current month)
  function buildMonthCols(foot){
    if(cols.type==='mes'){
      return cols.months.map((col,i)=>{
        const isNow=col.year===now.getFullYear()&&col.month===now.getMonth();
        return`<div class="${foot?'month-col-foot':'month-col'}" style="width:${COL_W}px;
          background:${isNow?'#e0f2fe':i%2===0?'#fff':'#fafafa'};
          border-top:${!foot&&isNow?'3px solid #0ea5e9':'none'}">
          <div class="${foot?'month-name-sm':'month-name'}" style="color:${isNow?'#0ea5e9':'#64748b'}">${isNow?'📍':''}${MONTH_NAMES[col.month]}</div>
          <div class="${foot?'month-year-sm':'month-year'}">${col.year}</div>
        </div>`;
      }).join('');
    }
    return cols.qs.map((q,i)=>{
      const isCurrent=q.months.some(x=>x.y===now.getFullYear()&&x.m===now.getMonth());
      return`<div class="${foot?'month-col-foot':'month-col'}" style="width:${COL_W}px;
        background:${isCurrent?'#e0f2fe':i%2===0?'#fff':'#fafafa'};
        border-top:${!foot&&isCurrent?'3px solid #0ea5e9':'none'}">
        <div class="${foot?'month-name-sm':'month-name'}" style="color:${isCurrent?'#0ea5e9':'#64748b'}">${isCurrent?'📍':''}${q.label}</div>
        <div class="${foot?'month-year-sm':'month-year'}" style="font-size:10px">${q.months.map(x=>MONTH_NAMES[x.m]).join('·')}</div>
      </div>`;
    }).join('');
  }
  document.getElementById('monthHeader').innerHTML=buildMonthCols(false);
  document.getElementById('monthFooter').innerHTML=buildMonthCols(true);

  // ── Today line
  document.getElementById('todayLine').style.left=tPct+'%';
  document.getElementById('todayLabel').style.left=tPct+'%';
  document.getElementById('todayLabel').textContent=`HOY ${now.getDate()}/${now.getMonth()+1}`;

  // ── Epic rows
  const colCount=cols.type==='mes'?cols.months.length:cols.qs.length;
  const gridLines=Array.from({length:colCount},(_,i)=>`<div class="grid-line" style="left:${i*COL_W}px"></div>`).join('');

  document.getElementById('epicRows').innerHTML=visibleDomains.map((domain,domainIdx)=>{
    const rows=packRows(byDomain[domain],cols);
    const isLast = domainIdx === visibleDomains.length - 1;
    const rowsHTML=rows.map(row=>{
      const barsHTML=row.epics.map(epic=>{
        const{startPx,widthPx}=getEpicPx(epic,cols);
        const lPct=(startPx/tot)*100;
        const wPct=(widthPx/tot)*100;
        const st=STATUS[effectiveStatus(epic)];
        const ct=COUNTRIES[epic.country];
        const safeTitle=epic.title.replace(/'/g,"\\'").replace(/"/g,'&quot;');
        const compact = widthPx < 80;
        return`<div class="epic-bar"
          onmouseenter="showTip('${safeTitle}','${epic.key}','${st.label}','${st.border}','${fmtDate(epic.start)}','${fmtDate(epic.end)}',${epic.progress},${epic.continua},event)"
          onmouseleave="scheduleHide()"
          style="left:${lPct}%;width:${wPct}%;top:${BAR_GAP}px;bottom:${BAR_GAP}px;
            background:${st.bg};border:2px solid ${st.border};
            border-right:${epic.continua?`3px dashed ${st.border}`:`2px solid ${st.border}`}">
          <div class="epic-flag" style="background:${ct.color}22">${ct.flag}</div>
          ${compact?'':`<a class="epic-jira" href="${epic.url}" target="_blank" style="background:${st.border}" onclick="event.stopPropagation()">↗</a>`}
          ${compact?'':((epic.tickets&&epic.tickets.length>0)?`<button onclick="event.stopPropagation();openTickets('${epic.key}')" title="Ver ${epic.tickets.length} tickets" style="position:absolute;top:3px;right:${epic.tickets.length?'56':'28'}px;background:${st.border}18;border:1px solid ${st.border}44;color:${st.border};border-radius:3px;font-size:8px;font-weight:700;padding:1px 4px;cursor:pointer;line-height:13px">▼ ${epic.tickets.length}</button>`:'')}
          <div class="epic-title" style="color:${st.border};${compact?'margin-right:0;padding-right:24px;white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.25;':'padding-right:52px;'}">${epic.title}</div>
          ${compact?'':`<div class="epic-meta">
            <span class="epic-key" style="color:${st.border};background:${st.border}18">${epic.key}</span>
            <span style="color:${st.border};font-weight:700;font-size:8px">${epic.progress}%</span>
          </div>`}
          ${compact?'':`<div class="progress-bg" style="background:${st.border}22">
            <div class="progress-fill" style="width:${epic.progress}%;background:${st.border}"></div>
          </div>`}
        </div>`;
      }).join('');
      return`<div class="epic-row" style="height:${ROW_H}px">${gridLines}${barsHTML}</div>`;
    }).join('');
    const sep = isLast ? '' : '<div style="height:3px;background:#94a3b8;flex-shrink:0"></div>';
    const domainH=Math.max(rows.length*ROW_H,190);
    return`<div style="height:${domainH}px;overflow:hidden">${rowsHTML}</div>${sep}`;
  }).join('');
}

// ─── HANDLERS ─────────────────────────────────────────────────────────────────
// ── TICKETS DRAWER ──────────────────────────────────────────────────────────
function statusColor(s) {
  const m = {
    'En progreso':       '#0284c7',
    'Ready for Testing': '#7c3aed',
    'Code Review':       '#7c3aed',
    'Ready For Release': '#059669',
    'Validación':        '#059669',
    'Pruebas':           '#059669',
    'Backlog':           '#94a3b8',
    'Para hacer':        '#94a3b8',
    'Cancelado':         '#dc2626',
    'Suspendido (Hold)': '#dc2626',
    'En Refinamiento':   '#f59e0b',
    'Actividad Refinada':'#f59e0b',
    'Seleccionado para desarrollar':'#0284c7',
  };
  return m[s] || '#94a3b8';
}

function openTickets(epicKey) {
  const allFlat = Object.values(ALL_EPICS).flat();
  const epic = allFlat.find(e => e.key === epicKey);
  if (!epic || !epic.tickets || epic.tickets.length === 0) return;

  expandedEpicKey = epicKey;
  const drawer = document.getElementById('ticketsDrawer');
  document.getElementById('ticketsTitle').textContent =
    epic.title + ' — ' + epic.tickets.length + ' ticket' + (epic.tickets.length !== 1 ? 's' : '');

  document.getElementById('ticketsGrid').innerHTML = epic.tickets.map(t => {
    const color = statusColor(t.status);
    const bgColor = color + '18';
    return `<div class="ticket-card">
      <div class="ticket-status-dot" style="background:${color}"></div>
      <div class="ticket-info">
        <a class="ticket-key" href="https://cencosud.atlassian.net/browse/${t.key}" target="_blank">${t.key}</a>
        <div class="ticket-title" title="${t.title}">${t.title}</div>
        <span class="ticket-status-label" style="background:${bgColor};color:${color}">${t.status}</span>
      </div>
    </div>`;
  }).join('');

  drawer.classList.remove('closed');
  drawer.classList.add('open');
  setTimeout(() => drawer.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
}

function closeTickets() {
  const drawer = document.getElementById('ticketsDrawer');
  drawer.classList.remove('open');
  drawer.classList.add('closed');
  expandedEpicKey = null;
}

function toggleView()      { sinceLastMonth=!sinceLastMonth; render(); }
function toggleOperacion() { showOperacion=!showOperacion; render(); }
function setScale(s)       { scale=s; render(); }
function toggleStatus(s) { filterStatus.has(s)?filterStatus.delete(s):filterStatus.add(s); render(); }
function toggleDomain(d) { if(!DOMAINS[d].hasData)return; filterDomains.has(d)?filterDomains.delete(d):filterDomains.add(d); render(); }
function toggleCountry(c){ filterCountries.has(c)?filterCountries.delete(c):filterCountries.add(c); render(); }
function setSolo(c)      { soloCountry=c; render(); }

// Timestamp inyectado por el proceso programado (reemplaza __PROCESS_TIME__)
const LAST_UPDATED = '29/05/2026 12:45';

function updateTimestamp(){
  var ts = (LAST_UPDATED && !LAST_UPDATED.startsWith('__')) ? LAST_UPDATED : '—';
  document.getElementById('timestamp').innerHTML='Proceso:<br/><b>'+ts+'</b>';
}

updateTimestamp();
render();
</script>
